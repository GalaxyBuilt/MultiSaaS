<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>MultiSaaS — Portfolio Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.5.0/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #16161f;
      --border: #1e1e2e;
      --border2: #2a2a3e;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --accent: #7c6aff;
      --accent2: #00e5cc;
      --accent3: #ff6b6b;
      --gold: #f5a623;
      --green: #00d68f;
      --red: #ff4757;
      --font: 'Syne', sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --theme-transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    [data-theme="light"] {
      --bg: #f8f9fc;
      --surface: #ffffff;
      --surface2: #f1f3f7;
      --border: #e2e8f0;
      --border2: #cbd5e1;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #6366f1;
      --accent2: #0ea5e9;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      transition: var(--theme-transition);
    }

    .app,
    .sidebar,
    .main,
    .topbar,
    .content,
    .card,
    .stat-card,
    .nav-item,
    .form-input,
    .btn-primary,
    .project-table th,
    .project-table td,
    .landing-wrap,
    .feature-card {
      transition: var(--theme-transition);
    }

    /* ─── Theme Toggle Button ─── */
    .theme-toggle-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text);
      font-size: 16px;
      transition: all 0.2s ease;
    }

    .theme-toggle-btn:hover {
      border-color: var(--accent);
      background: var(--border);
    }

    /* ─── Landing Page Styles ─── */
    .landing-wrap {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .landing-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .landing-hero {
      text-align: center;
      padding: 100px 24px 60px;
      max-width: 900px;
      margin: 0 auto;
    }

    .landing-badge {
      background: rgba(124, 106, 255, 0.1);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 24px;
      display: inline-block;
    }

    .landing-title {
      font-size: 64px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: -2px;
    }

    .text-gradient {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .landing-subtitle {
      font-size: 18px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .landing-hero-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .landing-btn-primary {
      background: var(--accent);
      color: white;
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-size: 15px;
      transition: transform 0.2s;
    }

    .landing-btn-primary.large {
      padding: 16px 36px;
      font-size: 17px;
    }

    .landing-btn-primary:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .landing-btn-secondary {
      background: var(--surface2);
      color: var(--text);
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 700;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s;
    }

    .landing-btn-secondary.large {
      padding: 16px 36px;
      font-size: 17px;
    }

    .landing-btn-secondary:hover {
      border-color: var(--accent);
    }

    .landing-btn-ghost {
      background: transparent;
      color: var(--muted);
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
    }

    .landing-btn-ghost:hover {
      color: var(--text);
    }

    .landing-preview {
      max-width: 1200px;
      margin: 60px auto;
      padding: 0 40px;
    }

    .preview-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .preview-header {
      height: 48px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      border-bottom: 1px solid var(--border);
    }

    .preview-dots {
      display: flex;
      gap: 6px;
    }

    .preview-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border2);
    }

    .preview-search {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--muted);
      flex: 1;
      max-width: 400px;
      text-align: center;
    }

    .preview-img {
      width: 100%;
      display: block;
      filter: grayscale(0.2);
      transition: filter 0.3s;
    }

    .preview-img:hover {
      filter: grayscale(0);
    }

    .landing-features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      max-width: 1200px;
      margin: 100px auto;
      padding: 0 40px;
    }

    .feature-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 32px;
      border-radius: 20px;
      transition: all 0.3s ease;
    }

    .feature-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
    }

    .feature-icon {
      font-size: 32px;
      margin-bottom: 20px;
    }

    .feature-card h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .feature-card p {
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .landing-footer {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
      font-size: 14px;
      border-top: 1px solid var(--border);
      margin-top: 100px;
    }

    /* ─── Login Enhancements ─── */
    .btn-back {
      position: absolute;
      top: 24px;
      left: 24px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }

    .btn-back:hover {
      color: var(--accent);
    }

    .login-error {
      background: rgba(255, 71, 87, 0.1);
      color: var(--red);
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      text-align: center;
      border: 1px solid rgba(255, 71, 87, 0.2);
    }

    .login-tabs .login-tab.disabled {
      color: var(--muted);
      cursor: not-allowed;
      border-bottom-color: transparent;
    }

    .login-tabs .login-tab.disabled:hover {
      color: var(--muted);
    }

    #root {
      height: 100%;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
    }

    .sidebar-logo {
      padding: 0 24px 32px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 0 12px;
    }

    .nav-section {
      margin-bottom: 24px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--muted);
      padding: 0 12px 8px;
      text-transform: uppercase;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .nav-item.active {
      background: rgba(124, 106, 255, 0.15);
      color: var(--accent);
    }

    .nav-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 60px;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 700;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge-mock {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(245, 166, 35, 0.15);
      color: var(--gold);
      border: 1px solid rgba(245, 166, 35, 0.3);
      text-transform: uppercase;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }

    /* Stat Cards */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .stat-card:hover {
      border-color: var(--border2);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .stat-card:hover::before {
      opacity: 1;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      font-family: var(--mono);
    }

    .stat-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .delta-up {
      color: var(--green);
      font-weight: 700;
    }

    .delta-down {
      color: var(--red);
      font-weight: 700;
    }

    /* Sections */
    .section-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
    }

    .card-badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 700;
      background: var(--surface2);
      color: var(--muted);
    }

    .card-body {
      padding: 20px;
    }

    /* Project Table */
    .project-table {
      width: 100%;
      border-collapse: collapse;
    }

    .project-table th {
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .project-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .project-table tr:last-child td {
      border-bottom: none;
    }

    .project-table tr:hover td {
      background: var(--surface2);
    }

    .project-name {
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .project-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      background: var(--green);
    }

    .mono {
      font-family: var(--mono);
      font-size: 12px;
    }

    /* Charts */
    .chart-container {
      width: 100%;
    }

    /* Expense breakdown */
    .expense-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .expense-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .expense-row-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }

    .expense-label {
      font-weight: 600;
      color: var(--text);
    }

    .expense-amount {
      font-family: var(--mono);
      color: var(--muted);
    }

    .progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    /* Project tabs */
    .tab-bar {
      display: flex;
      gap: 4px;
      padding: 16px 20px 0;
    }

    .tab-btn {
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      color: var(--muted);
      background: none;
      transition: all 0.15s;
    }

    .tab-btn:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .tab-btn.active {
      color: var(--accent);
      background: rgba(124, 106, 255, 0.12);
    }

    /* Login page */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 20% 50%, rgba(124, 106, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 229, 204, 0.06) 0%, transparent 50%);
    }

    .login-card {
      width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo h1 {
      font-size: 26px;
      font-weight: 800;
    }

    .login-logo p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .demo-hint {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .demo-hint strong {
      color: var(--text);
    }

    .login-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 3px;
    }

    .login-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-family: var(--font);
      background: none;
      color: var(--muted);
      transition: all 0.15s;
    }

    .login-tab.active {
      background: var(--surface);
      color: var(--text);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.3s ease both;
    }

    .fade-in-2 {
      animation: fadeIn 0.3s ease 0.1s both;
    }

    .fade-in-3 {
      animation: fadeIn 0.3s ease 0.2s both;
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .stat-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 900px) {
      .section-grid {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { LineChart, Line, AreaChart, Area, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

    // ─── Mock Data ────────────────────────────────────────────────────────────────

    const MOCK_GLOBAL = {
      summary: { totalMrr: 19460, totalArr: 233520, totalRevenueLtm: 198840, totalExpensesLtm: 54200, totalProfit: 144640, totalCustomers: 413, avgMrrGrowth: 4.7, projectCount: 3 },
      projects: [
        { id: 'mock-1', name: 'FormFlow', emoji: '📋', mrr: 5180, arr: 62160, customers: 102, mrrGrowth: 4.2, profitMargin: 72, status: 'ACTIVE' },
        { id: 'mock-2', name: 'InboxZen', emoji: '📬', mrr: 10940, arr: 131280, customers: 248, mrrGrowth: 7.8, profitMargin: 78, status: 'ACTIVE' },
        { id: 'mock-3', name: 'ShipTrackr', emoji: '🚚', mrr: 3340, arr: 40080, customers: 63, mrrGrowth: 2.1, profitMargin: 68, status: 'ACTIVE' },
      ],
      mrrTrend: [

                  </ResponsiveContainer>
                  <div style={{ marginTop: 16 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--muted)', marginBottom: 10, textTransform: 'uppercase', letterSpacing: 1 }}>Recent Transactions</div>
                    <table className="project-table">
                      <thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Source</th><th style={{ textAlign: 'right' }}>Amount</th></tr></thead>
                      <tbody>
                        {detail.recentRevenue.map((r, i) => (
                          <tr key={i}>
                            <td className="mono" style={{ color: 'var(--muted)', fontSize: 11 }}>{r.date}</td>
                            <td><span style={{ background: 'rgba(124,106,255,0.12)', color: 'var(--accent)', borderRadius: 4, padding: '2px 7px', fontSize: 11, fontWeight: 700 }}>{r.type}</span></td>
                            <td style={{ color: 'var(--muted)', fontSize: 12 }}>{r.desc}</td>
                            <td style={{ fontSize: 11, color: 'var(--muted)' }}>{r.source}</td>
                            <td className="mono" style={{ textAlign: 'right', color: r.amount < 0 ? 'var(--red)' : 'var(--green)' }}>{fmtFull(r.amount)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </>
              )}
              {tab === 'expenses' && (
                <>
                  <ResponsiveContainer width="100%" height={200}>
                    <AreaChart data={detail.monthly} margin={{ top: 5, right: 10, left: -10, bottom: 0 }}>
                      <defs>
                        <linearGradient id="gExp" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%" stopColor="#ff4757" stopOpacity={0.2} />
                          <stop offset="95%" stopColor="#ff4757" stopOpacity={0} />
                        </linearGradient>
                      </defs>
                      <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" vertical={false} />
                      <XAxis dataKey="month" tick={{ fill: 'var(--muted)', fontSize: 11 }} axisLine={false} tickLine={false} />
                      <YAxis tick={{ fill: 'var(--muted)', fontSize: 11 }} axisLine={false} tickLine={false} tickFormatter={v => `$${v}`} />
                      <Tooltip content={<CUSTOM_TOOLTIP />} />
                      <Area type="monotone" dataKey="expenses" name="Expenses" stroke="#ff4757" strokeWidth={2} fill="url(#gExp)" />
                    </AreaChart>
                  </ResponsiveContainer>
                  <div style={{ marginTop: 16 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--muted)', marginBottom: 10, textTransform: 'uppercase', letterSpacing: 1 }}>Recent Expenses</div>
                    <table className="project-table">
                      <thead><tr><th>Date</th><th>Category</th><th>Vendor</th><th>Description</th><th>Recurring</th><th style={{ textAlign: 'right' }}>Amount</th></tr></thead>
                      <tbody>
                        {detail.recentExpenses.map((e, i) => (
                          <tr key={i}>
                            <td className="mono" style={{ color: 'var(--muted)', fontSize: 11 }}>{e.date}</td>
                            <td><span style={{ background: 'rgba(255,71,87,0.12)', color: 'var(--accent3)', borderRadius: 4, padding: '2px 7px', fontSize: 11, fontWeight: 700 }}>{e.category}</span></td>
                            <td style={{ fontSize: 12 }}>{e.vendor || '—'}</td>
                            <td style={{ color: 'var(--muted)', fontSize: 12 }}>{e.desc}</td>
                            <td style={{ fontSize: 11 }}>{e.recurring ? <span style={{ color: 'var(--gold)' }}>🔁 Yes</span> : '—'}</td>
                            <td className="mono" style={{ textAlign: 'right', color: 'var(--red)' }}>-{fmtFull(e.amount)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── Projects List ─────────────────────────────────────────────────────────────

    function ProjectsList({ projects, onSelect }) {
      return (
        <div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 16 }}>
            {projects.map((p, i) => (
              <div key={p.id} className="card fade-in" style={{ cursor: 'pointer', animationDelay: `${i * 0.08}s` }} onClick={() => onSelect(p.id)}>
                <div className="card-body">
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 18 }}>
                    <div style={{ width: 40, height: 40, borderRadius: 10, background: i === 0 ? 'rgba(124,106,255,0.15)' : i === 1 ? 'rgba(0,229,204,0.15)' : 'rgba(245,166,35,0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>
                      {p.emoji}
                    </div>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 15 }}>{p.name}</div>
                      <div style={{ fontSize: 12, color: 'var(--muted)' }}>{p.status}</div>
                    </div>
                    <div style={{ marginLeft: 'auto', color: 'var(--green)', fontFamily: 'var(--mono)', fontSize: 13, fontWeight: 700 }}>{fmt(p.mrr)}<div style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 400, textAlign: 'right' }}>MRR</div></div>
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
                    {[['ARR', fmt(p.arr)], ['Customers', fmtNum(p.customers)], ['Growth', `+${p.mrrGrowth}%`]].map(([label, val], j) => (
                      <div key={j} style={{ background: 'var(--surface2)', borderRadius: 8, padding: '10px 12px' }}>
                        <div style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>{label}</div>
                        <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: j === 2 ? 'var(--green)' : 'var(--text)' }}>{val}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── Main App ─────────────────────────────────────────────────────────────────

    function App() {
      const [view, setView] = useState('landing'); // 'landing', 'login', 'dashboard'
      const [user, setUser] = useState(null);
      const [page, setPage] = useState('global');
      const [theme, setTheme] = useState(() => {
        return localStorage.getItem('multisaas_theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      });

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('multisaas_theme', theme);
      }, [theme]);

      const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

      const { summary, projects, mrrTrend, revenueBreakdown, expenseBreakdown } = MOCK_GLOBAL;

      if (view === 'landing') {
        return <LandingPage onStart={() => setView('login')} />;
      }

      if (view === 'login' && !user) {
        return <LoginPage onLogin={u => { setUser(u); setView('dashboard'); }} onBack={() => setView('landing')} />;
      }

      if (view === 'dashboard' && user) {
        const pageTitle = page === 'global' ? 'Global Dashboard' :
          page === 'projects' ? 'All Projects' :
            projects.find(p => p.id === page)?.name || 'Dashboard';

        const currentProject = projects.find(p => p.id === page);

        return (
          <div className="app">
            <Sidebar page={page} setPage={setPage} projects={projects} onLogout={() => { setUser(null); setView('landing'); }} />
            <div className="main">
              <div className="topbar">
                <div className="topbar-title">{pageTitle}</div>
                <div className="topbar-right">
                  <ThemeToggle theme={theme} toggle={toggleTheme} />
                  <span className="badge-mock">✦ Admin Access</span>
                  <div className="avatar" onClick={() => { setUser(null); setView('landing'); }} title="Click to logout">
                    {user.name?.[0]?.toUpperCase() || 'U'}
                  </div>
                </div>
              </div>
              <div className="content">
                {page === 'global' && <GlobalDashboard data={MOCK_GLOBAL} />}
                {page === 'projects' && <ProjectsList projects={projects} onSelect={setPage} />}
                {currentProject && <ProjectDetail project={currentProject} />}
              </div>
            </div>
          </div>
        );
      }

      return <LandingPage onStart={() => setView('login')} />;
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>

</html>
